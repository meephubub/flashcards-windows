name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # 1. Install pnpm first so setup-node can detect its lockfile for caching
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 2. Setup Node with built-in pnpm caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      # 3. Install Rust & configure the faster LLD linker for Windows
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Configure LLD Linker (Windows)
        shell: bash
        run: |
          mkdir -p .cargo
          echo -e "[target.x86_64-pc-windows-msvc]\nrustflags = [\"-C\", \"link-arg=-fuse-ld=lld\"]" >> .cargo/config.toml

      # 4. Cache Rust dependencies efficiently
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # 5. Only install dependencies. Let tauri-action handle the frontend build!
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # 6. Build and Publish Tauri App
      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Flashcards ${{ github.ref_name }}"
          releaseBody: "New release"
          releaseDraft: false
          prerelease: false
